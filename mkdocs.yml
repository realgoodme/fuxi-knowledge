site_name: 思想仓库
site_description: 思想仓库 - 朴散原创，沉淀写作素材与技术思考
site_url: https://realgoodme.github.io/fuxi-knowledge
docs_dir: .site-docs

theme:
  name: material
  language: zh
  icon:
    logo: fontawesome/solid/book-open
  favicon: assets/images/favicon.ico
  logo: assets/images/logo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: orange
      toggle:
        icon: material/weather-night
        name: 切换到夜间模式
    - scheme: slate
      primary: black
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: 切换到日间模式

extra:
  generator: false

extra_css:
  - assets/stylesheets/custom.css

copyright: Copyright &copy; 2026 朴散

plugins:
  - search
  - roamlinks

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details

nav:
  - 首页: index.md
  - 朴散原创:
    - 一个笨人的2025年年终总结: raw/articles/pusanz-2025-summary.md
